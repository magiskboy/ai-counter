# Copy to $SANDBOX/ai-counter/config.yaml after bootstrap.
# Paths below are relative to HOME (/home/counter in the user `counter`).

# Global automation targets (each project can override).
automation:
  user_messages_per_conversation: 2
  delay_between_messages_seconds: 20
  # If omitted, uses cursor.delay_between_sessions
  delay_between_conversations_seconds: 45

# Agent skills: installed via `npx skills add <repo> --skill <name> -a cursor -y`
# See: npx skills --help  |  https://github.com/vercel-labs/agent-skills
skills:
  agent: cursor
  yes: true
  default_repo: https://github.com/obra/superpowers
  # Installed once into $HOME/.agents/skills/ (-g) for all projects
  global_packages:
    - repo: https://github.com/obra/superpowers
      skills:
        - brainstorming

sandbox:
  projects_dir: projects
  projects:
    - name: fake-api
      conversations_per_day: 4
      user_messages_per_conversation: 3
      skills:
        - systematic-debugging
        - writing-plans
    - name: fake-web
      conversations_per_day: 3
      skills:
        - repo: https://github.com/obra/superpowers
          names: [using-superpowers]
          global: true
    - name: fake-lib
      conversations_per_day: 3

cursor:
  binary: cursor-agent
  # Headless auto-approve (see cursor.com/docs/cli/headless, /cli/mcp):
  # -p/--print + --trust (workspace) + --force/--yolo (shell/file tools) + --approve-mcps (MCP)
  flags:
    - "-p"
    - "--trust"
    - "-f"
    - "--approve-mcps"
  timeout_seconds: 900
  delay_between_sessions: 45

z8l:
  binary: /usr/local/bin/z8l
  sync_provider: cursor

schedule:
  # Container TZ (cron + logs). Override with -e TZ=... on podman run, or mount host /etc/localtime.
  timezone: Asia/Ho_Chi_Minh
  cron: "30 6 * * 1-5"

prompts:
  file: /opt/ai-counter/prompts/daily.yaml
  rotate: daily
